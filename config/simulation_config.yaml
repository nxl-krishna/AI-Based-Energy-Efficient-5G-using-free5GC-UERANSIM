# Simulation Configuration for AI-Based Energy Efficient 5G

simulation:
  # Total simulation duration (in seconds)
  duration: 86400  # 24 hours
  
  # Time step interval for simulation (in seconds)
  time_step: 60    # 1 minute
  
  # Number of base stations
  num_base_stations: 10
  
  # Coverage radius per base station (in meters)
  bs_coverage_radius: 1000

ueransim:
  # User Equipment (UE) settings
  users:
    min_count: 50
    max_count: 500
    initial_count: 100
    spawn_rate: 10  # Users per hour
    churn_rate: 15  # Users leaving per hour
  
  # Data generation pattern: "realistic", "constant", "random"
  data_generation:
    pattern: "realistic"
    min_data_rate_mbps: 0.5
    max_data_rate_mbps: 50.0
    
  # Movement model: "static", "random_walk", "mobility_trace"
  mobility:
    model: "random_walk"
    velocity_kmh: 10

network:
  # Traffic patterns (peak and off-peak hours)
  traffic_patterns:
    peak_hours: [18, 19, 20, 21, 22]        # 6 PM - 10 PM
    off_peak_hours: [1, 2, 3, 4, 5, 6]     # 1 AM - 6 AM
    shoulder_hours: [7, 8, 12, 13, 17]     # 7-8 AM, 12-1 PM, 5 PM
  
  # QoS requirements
  qos:
    target_latency_ms: 20
    max_latency_ms: 100
    min_throughput_mbps: 1
    target_pdr: 0.99  # Packet Delivery Ratio

free5gc:
  # free5GC API endpoints
  api:
    base_url: "http://localhost:8000"
    timeout_sec: 10
  
  # Subscriber database
  subscribers:
    imsi_prefix: "208930000000001"
    count: 500
  
  # Session management
  sessions:
    max_sessions_per_user: 5
    session_timeout_sec: 3600

base_station:
  # Power consumption models (in Watts)
  power:
    idle_power: 500
    active_power: 2000
    sleep_power: 50
    
    # Transition time (seconds)
    sleep_to_active_time: 30
    active_to_sleep_time: 10
  
  # Load thresholds for switching
  control:
    sleep_threshold: 0.2      # Switch to sleep if load < 20%
    active_threshold: 0.5     # Activate if load > 50%
    hysteresis_margin: 0.05   # Prevent oscillation

traffic_monitoring:
  # Data collection intervals
  collection_interval_sec: 60
  
  # Metrics to collect
  metrics:
    - active_users
    - data_usage
    - latency
    - throughput
    - packet_loss_rate
    - energy_consumption
  
  # Storage
  storage:
    type: "csv"  # Options: "csv", "mongodb", "sqlite"
    path: "../data/traffic_logs/"
    retention_days: 30

ai_model:
  # Model type and architecture
  type: "lstm"  # Options: "lstm", "transformer", "prophet"
  
  # Training parameters
  training:
    lookback_window: 24        # Hours of historical data
    prediction_horizon: 24     # How far to predict (hours)
    train_test_split: 0.8
    epochs: 100
    batch_size: 32
    learning_rate: 0.001
    early_stopping_patience: 10
  
  # LSTM architecture
  lstm:
    num_layers: 2
    units_per_layer: [64, 32]
    dropout: 0.2
    output_activation: "relu"
  
  # Input features
  features:
    - hour_of_day
    - day_of_week
    - is_holiday
    - previous_load_1h
    - previous_load_6h
    - previous_load_24h

decision_engine:
  # Decision algorithm: "threshold", "rule_based", "reinforcement_learning"
  algorithm: "rule_based"
  
  # Rules for state transitions
  rules:
    sleep_threshold: 0.2       # Load % below which BS sleeps
    active_threshold: 0.5      # Load % above which BS must be active
    energy_saving_target: 0.30 # Target 30% energy reduction
  
  # Update frequency
  decision_update_interval_sec: 300  # 5 minutes

evaluation:
  # Comparison baselines
  baselines:
    - "always_on"              # Always keep all BS active
    - "static_schedule"        # Fixed on/off schedule
    - "ai_optimized"           # AI-based control
  
  # Metrics to calculate
  metrics:
    - total_energy_consumed
    - average_latency
    - peak_latency
    - packet_loss_rate
    - bs_sleep_percentage
    - cost_per_user_per_hour
  
  # Output format
  output:
    format: "csv"
    path: "../data/results/"
    generate_plots: true
    plot_formats: ["png", "pdf"]

logging:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  
  # Log file paths
  files:
    simulation: "../data/logs/simulation.log"
    monitoring: "../data/logs/monitoring.log"
    ai_model: "../data/logs/ai_model.log"
    decision: "../data/logs/decision_engine.log"
