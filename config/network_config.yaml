# network_config.yaml
# Configuration for the real Linux 5G deployment

linux_environment: true

free5gc:
  deployment_type: "docker" # "docker" or "systemd"
  docker_compose_dir: "~/free5gc-compose"
  upf_interface: "upfgtp" # Interface to monitor for data transfer

ueransim:
  bin_path: "~/UERANSIM/build"
  config_path: "~/UERANSIM/config"
  tun_interface: "uesimtun0"
  
base_stations:
  # Examples of real binding IP and configs for simulated nodes
  - bs_id: 1
    gnb_config: "free5gc-gnb.yaml"
  - bs_id: 2
    gnb_config: "free5gc-gnb-2.yaml"
