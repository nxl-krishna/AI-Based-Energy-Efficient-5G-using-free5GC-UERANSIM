# Network Topology Configuration

network:
  # Network topology type
  topology_type: "mesh"  # Options: "mesh", "star", "grid"
  
  # Geographic simulation area
  area:
    length_km: 10
    width_km: 10
    unit: "meters"

# Base Station Configuration
base_stations:
  - id: 1
    location: { x: 2000, y: 2000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 2
    location: { x: 8000, y: 2000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 3
    location: { x: 2000, y: 8000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 4
    location: { x: 8000, y: 8000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 5
    location: { x: 5000, y: 5000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 6
    location: { x: 3000, y: 5000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 7
    location: { x: 7000, y: 5000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 8
    location: { x: 5000, y: 3000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 9
    location: { x: 5000, y: 7000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000
    
  - id: 10
    location: { x: 1000, y: 1000 }
    coverage_radius: 1000
    capacity_users: 100
    max_throughput_mbps: 1000

# Core Network (free5GC) Topology
core_network:
  amf:
    # Access and Mobility Management Function
    id: "AMF-1"
    endpoint: "http://amf:3100"
    subscribers: 5000
  
  smf:
    # Session Management Function
    id: "SMF-1"
    endpoint: "http://smf:3200"
    max_sessions: 10000
  
  upf:
    # User Plane Function
    id: "UPF-1"
    endpoint: "http://upf:8805"
    throughput_constraint: "unlimited"  # Mbps
    
# Network Slicing
network_slices:
  - slice_id: 1
    slice_name: "eMBB"  # Enhanced Mobile Broadband
    description: "High throughput, moderate latency"
    latency_requirement_ms: 10
    throughput_requirement_mbps: 100
    
  - slice_id: 2
    slice_name: "URLLC"  # Ultra-Reliable Low-Latency
    description: "Low latency, high reliability"
    latency_requirement_ms: 1
    reliability_requirement: 0.99999
    
  - slice_id: 3
    slice_name: "mMTC"   # Massive Machine Type Communication
    description: "Large number of devices, low data"
    device_count_support: 100000
    latency_requirement_ms: 10000

# Traffic Routing
routing:
  load_balancing_algorithm: "least_loaded"  # Options: "round_robin", "least_loaded", "latency_aware"
  
  # Path costs
  path_optimization: enabled
  
  # Handover configuration
  handover:
    enabled: true
    threshold_rsrp_dbm: -140
    threshold_rsrq_db: -3
    time_to_trigger_ms: 200

# Interference Model
interference:
  model: "log_distance"  # Options: "log_distance", "3gpp", "none"
  pathloss_exponent: 3.5
  reference_distance: 1
  reference_power: -30  # dBm/MHz

# Handover Configuration
handover:
  enabled: true
  
  # Serving cell selection
  serving_cell:
    algorithm: "strongest_rsrp"  # Options: "strongest_rsrp", "strongest_rsrq"
    measurement_period_ms: 200
  
  # Handover triggers
  triggers:
    a3_offset_db: 3.0
    time_to_trigger_ms: 300
    max_handovers_per_day: 100

# Frequency Bands
frequency_bands:
  - name: "n77"
    frequency_ghz: 3.5
    bandwidth_mhz: 100
    
  - name: "n78"
    frequency_ghz: 3.75
    bandwidth_mhz: 100
    
  - name: "n79"
    frequency_ghz: 4.5
    bandwidth_mhz: 50

# QoS Framework
qos:
  qos_classes:
    - class_id: 1
      name: "URLLC"
      packet_loss_rate: 0.00001
      latency_ms: 1
      
    - class_id: 2
      name: "eMBB"
      packet_loss_rate: 0.001
      latency_ms: 20
      
    - class_id: 3
      name: "mMTC"
      packet_loss_rate: 0.1
      latency_ms: 1000
